<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Usage</title>
<link rel="preload" href="/vendor/fonts/outfit-latin.woff2" as="font" type="font/woff2">
<link rel="preload" href="/vendor/fonts/jetbrains-mono-latin.woff2" as="font" type="font/woff2">
<script src="/vendor/chart.umd.min.js"></script>
<style>
@font-face{
  font-family:'Outfit';
  font-style:normal;
  font-weight:300 600;
  font-display:block;
  src:url('/vendor/fonts/outfit-latin.woff2') format('woff2');
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
}
@font-face{
  font-family:'Outfit';
  font-style:normal;
  font-weight:300 600;
  font-display:block;
  src:url('/vendor/fonts/outfit-latin-ext.woff2') format('woff2');
  unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;
}
@font-face{
  font-family:'JetBrains Mono';
  font-style:normal;
  font-weight:400 600;
  font-display:block;
  src:url('/vendor/fonts/jetbrains-mono-latin.woff2') format('woff2');
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
}
@font-face{
  font-family:'JetBrains Mono';
  font-style:normal;
  font-weight:400 600;
  font-display:block;
  src:url('/vendor/fonts/jetbrains-mono-cyrillic.woff2') format('woff2');
  unicode-range:U+0301,U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116;
}
:root{--c-bg:#0b0b0f;--c-surface:#16161e;--c-surface-hover:#1c1c28;--c-surface-active:#242432;--c-border:#323244;--c-border-hover:#a0a0ba;--c-muted:#9898b4;--c-dim:#acacc4;--c-mid:#bdbdd2;--c-mid-hover:#c0c0d4;--c-text:#d0d0dc;--c-heading:#eeeeF4;--c-grid:#1a1a28;--c-row-border:#161620;--c-row-hover:#12121c;--c-total-bg:#0e0e16;--c-shadow:rgba(0,0,0,.5);--c-shadow-sm:rgba(0,0,0,.4);--c-check-bg:#6bc4a318;--c-check-border:#6bc4a360;--c-green:#6ee7b7;--c-yellow:#fbbf24;--c-yellow-dim:#fbbf2480}
[data-theme="light"]{--c-bg:#f0f0f4;--c-surface:#ffffff;--c-surface-hover:#e4e4eb;--c-surface-active:#d4d4de;--c-border:#b8b8c8;--c-border-hover:#3a3a5c;--c-muted:#3c3c58;--c-dim:#2e2e4a;--c-mid:#22223e;--c-mid-hover:#282840;--c-text:#2a2a40;--c-heading:#101024;--c-grid:#d8d8e2;--c-row-border:#dcdce6;--c-row-hover:#eaeaf0;--c-total-bg:#e0e0ea;--c-shadow:rgba(0,0,0,.12);--c-shadow-sm:rgba(0,0,0,.08);--c-check-bg:#6bc4a325;--c-check-border:#6bc4a370;--c-green:#059669;--c-yellow:#b45309;--c-yellow-dim:#b4530980}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:115%}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--c-bg);color:var(--c-text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s,border-color .2s}
*::-webkit-scrollbar{width:6px;height:6px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:3px}
*::-webkit-scrollbar-thumb:hover{background:var(--c-border-hover)}

.page{max-width:1080px;margin:0 auto;padding:48px 32px 64px}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--c-bg);color:var(--c-muted);font-size:.85rem;z-index:500;opacity:0;pointer-events:none}
#loading.show{opacity:1;pointer-events:auto}

/* ── Header ─────────────────────────── */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:48px}
.title{font-size:1.1rem;font-weight:500;color:var(--c-heading);letter-spacing:-.01em}
.header-right{display:flex;align-items:center;gap:16px}
.date-range{font-size:.78rem;color:var(--c-muted);font-weight:400;min-width:180px;text-align:right}
.theme-btn{font-size:.85rem;background:none;border:1px solid var(--c-surface-active);color:var(--c-muted);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;line-height:1}
.theme-btn:hover{color:var(--c-mid);border-color:var(--c-border)}
.update-btn{font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:400;color:var(--c-muted);background:none;border:1px solid var(--c-surface-active);padding:0 12px;height:28px;border-radius:6px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center}
.update-btn:hover{color:var(--c-mid);border-color:var(--c-border)}
.update-btn:disabled{opacity:.4;cursor:wait}
.tf-nav{display:flex;align-items:center;gap:4px}
.tf-arrow{background:none;border:none;color:var(--c-muted);font-size:.85rem;cursor:pointer;padding:4px 8px;border-radius:4px;font-family:'Outfit',sans-serif;transition:all .12s;line-height:1}
.tf-arrow:hover:not(:disabled){color:var(--c-mid);background:var(--c-surface-active)}
.tf-arrow:disabled{opacity:.15;cursor:default}

/* ── Stats ──────────────────────────── */
.stats{display:flex;gap:40px;margin-bottom:48px;padding-bottom:40px;border-bottom:1px solid var(--c-surface-hover)}
.stat-label{font-size:.65rem;color:var(--c-muted);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:6px}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:500;color:var(--c-heading);letter-spacing:-.02em;line-height:1}
.stat-sub{font-size:.72rem;color:var(--c-muted);margin-top:6px;font-weight:400}
.stat-sub .up{color:var(--c-green)}
.stat-sub .down{color:var(--c-yellow)}

/* ── Controls ───────────────────────── */
.controls-area{margin-bottom:24px}
.controls{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.controls-left{display:flex;gap:12px;align-items:center}
.tab-row{display:flex;gap:2px}
.tab{padding:5px 14px;border:none;border-radius:6px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:500;background:transparent;color:var(--c-muted);transition:all .15s}
.tab.active{background:var(--c-surface-active);color:var(--c-heading)}
.tab:hover:not(.active):not(:disabled){color:var(--c-mid)}
.tab:disabled{opacity:.25;cursor:not-allowed}
.controls-right{display:flex;gap:16px;align-items:center}
.sep{width:1px;height:16px;background:var(--c-surface-active)}

/* ── Filter dropdown ────────────────── */
.filter-dd{position:relative}
.filter-trigger{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;border:1px solid var(--c-surface-active);background:transparent;color:var(--c-dim);font-family:'Outfit',sans-serif;font-size:.72rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-trigger:hover{color:var(--c-mid-hover);border-color:var(--c-border)}
.filter-trigger .dd-arrow{font-size:.55rem;margin-left:2px;transition:transform .15s}
.filter-trigger.open .dd-arrow{transform:rotate(180deg)}
.filter-panel{position:absolute;top:calc(100% + 4px);left:0;z-index:100;background:var(--c-surface-hover);border:1px solid var(--c-border);border-radius:8px;padding:6px 0;min-width:300px;max-height:380px;display:none;box-shadow:0 8px 32px var(--c-shadow)}
.filter-panel.open{display:block}
.filter-actions{display:flex;gap:8px;padding:6px 12px 8px;border-bottom:1px solid var(--c-surface-hover);margin-bottom:2px}
.filter-act{font-size:.65rem;color:var(--c-muted);cursor:pointer;background:none;border:none;padding:2px 4px;font-family:'Outfit',sans-serif;transition:color .12s}
.filter-act:hover{color:var(--c-mid-hover)}
.filter-scroll{max-height:300px;overflow-y:auto}
.filter-item{display:flex;align-items:center;gap:6px;padding:4px 12px;cursor:pointer;font-size:.72rem;color:var(--c-muted);transition:background .1s}
.filter-item:hover{background:var(--c-surface-hover)}
.filter-item.on{color:var(--c-text)}
.filter-check{flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:6px 10px 6px 4px}
.filter-check-box{width:12px;height:12px;border:1.5px solid var(--c-border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.5rem;transition:all .12s}
.filter-item.on .filter-check-box{background:var(--c-check-bg);border-color:var(--c-check-border);color:#6bc4a3}
.filter-item.on .filter-check-box{background:var(--c-check-bg);border-color:var(--c-check-border);color:#6bc4a3}
.proj-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.filter-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.filter-cost{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--c-border-hover);flex-shrink:0}

/* ── Chart ──────────────────────────── */
.chart-area{margin-bottom:40px}
.chart-wrap{position:relative;height:300px}
.chart-fallback{height:100%;display:flex;align-items:center;justify-content:center;border:1px dashed var(--c-border);border-radius:8px;color:var(--c-border-hover);font-size:.78rem}

/* ── Model legend ──────────────────── */
.model-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.mleg{display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--c-muted);cursor:pointer;transition:opacity .15s;user-select:none}
.mleg.off{opacity:.2;text-decoration:line-through}
.mleg:hover{color:var(--c-mid)}
.mleg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Bottom ─────────────────────────── */
.bottom-2col{display:grid;grid-template-columns:1fr 1fr;gap:56px;margin-bottom:48px}

/* ── Stat tooltip ──────────────────── */
.stat-hover{position:relative;cursor:default}
.stat-tip{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);z-index:50;background:var(--c-surface-hover);border:1px solid var(--c-border);border-radius:8px;padding:10px 14px;min-width:220px;max-height:320px;overflow-y:auto;display:none;box-shadow:0 8px 32px var(--c-shadow-sm)}
.stat-hover::after{content:'';position:absolute;left:-8px;right:-8px;top:100%;height:10px}
.stat-hover:hover .stat-tip{display:block}
.tip-row{display:flex;justify-content:space-between;padding:3px 0;font-size:.7rem}
.tip-label{color:var(--c-dim)}
.tip-val{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--c-text)}
.tip-sep{border-top:1px solid var(--c-surface-hover);margin:6px 0}
.section-label{font-size:.6rem;color:var(--c-border-hover);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:16px}

/* ── Calendar ───────────────────────── */
.cal-area{overflow-x:auto}
.cal-cell{width:14px;height:14px;border-radius:2px;cursor:pointer;transition:opacity .12s}
.cal-cell:hover{opacity:.7}
#cal-tip{position:fixed;z-index:200;background:var(--c-surface-hover);border:1px solid var(--c-border);border-radius:6px;padding:4px 8px;font-size:.65rem;color:var(--c-text);white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px var(--c-shadow-sm);font-family:'JetBrains Mono',monospace;display:none}
.cal-legend{display:flex;align-items:center;gap:4px;margin-top:10px;font-size:.6rem;color:var(--c-border-hover)}

/* ── Breakdown ──────────────────────── */
.bk-item{margin-bottom:10px}
.bk-top{display:flex;justify-content:space-between;font-size:.72rem;margin-bottom:4px}
.bk-name{color:var(--c-mid);font-weight:400;display:flex;align-items:center;gap:6px}
.bk-val{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--c-muted);font-weight:400}
.bk-track{height:3px;background:var(--c-surface-active);border-radius:2px;overflow:hidden}
.bk-fill{height:100%;border-radius:2px}

/* ── Table ──────────────────────────── */
.table-section{border-top:1px solid var(--c-surface-hover);padding-top:24px}
.table-toggle{font-size:.68rem;color:var(--c-muted);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;font-weight:400;padding:0}
.table-toggle:hover{color:var(--c-mid-hover)}
.table-wrap{max-height:0;overflow:hidden;transition:max-height .3s}
.table-wrap.open{max-height:400px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.72rem;margin-top:12px}
th{text-align:left;padding:6px 8px;color:var(--c-border-hover);font-weight:500;font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--c-surface-hover);position:sticky;top:0;background:var(--c-bg)}
td{padding:5px 8px;border-bottom:1px solid var(--c-row-border);color:var(--c-dim)}
tr:hover td{background:var(--c-row-hover)}
td.col-hl,th.col-hl{background:var(--c-row-hover)}
tr:hover td.col-hl{background:var(--c-row-hover)}
.num{text-align:right;font-family:'JetBrains Mono',monospace;font-size:.68rem}
.cost-td{text-align:right;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:500;color:var(--c-green)}
.tr-total{position:sticky;bottom:0}.tr-total td{background:var(--c-total-bg)!important;font-weight:600;border-top:1px solid var(--c-border);color:var(--c-heading)}

.footer{text-align:center;font-size:.65rem;color:var(--c-border);margin-top:48px;padding-top:24px;border-top:1px solid var(--c-surface-hover)}

@media(max-width:768px){
  .page{padding:24px 16px 40px}
  .stats{gap:32px;flex-wrap:wrap}
  .bottom-2col{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="loading">Loading…</div>
<div id="cal-tip"></div>

<div class="page" id="content" style="visibility:hidden;opacity:0">

<div class="header">
  <div class="title">Claude Code Usage</div>
  <div class="header-right">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">☾</button>
    <button class="update-btn" id="update-btn" onclick="refreshData()">↻ Update</button>
    <div class="tf-nav">
      <button class="tf-arrow" id="tf-prev" onclick="tfPrev()" style="display:none">◂</button>
      <div class="date-range" id="date-range"></div>
      <button class="tf-arrow" id="tf-next" onclick="tfNext()" style="display:none">▸</button>
    </div>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="controls-area">
  <div class="controls">
    <div class="controls-left">
      <div class="tab-row" id="metric-tabs"></div>
      <div class="filter-dd" id="filter-dd">
        <button class="filter-trigger" id="filter-trigger" onclick="toggleFilter()">
          <span id="filter-label">All projects</span>
          <span class="dd-arrow">▾</span>
        </button>
        <div class="filter-panel" id="filter-panel">
          <div class="filter-actions">
            <button class="filter-act" onclick="event.stopPropagation();selAll()">all</button>
            <button class="filter-act" onclick="event.stopPropagation();selTop()">top 5</button>
          </div>
          <div class="filter-scroll" id="filter-list"></div>
        </div>
      </div>
    </div>
    <div class="controls-right">
      <div class="tab-row" id="tf-tabs"></div>
      <div class="sep"></div>
      <div class="tab-row" id="gran-tabs"></div>
      <div class="sep"></div>
      <div class="tab-row" id="stack-tabs"></div>
    </div>
  </div>
</div>

<div class="chart-area">
  <div id="model-legend" class="model-legend"></div>
  <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
</div>

<div class="bottom-2col">
  <div>
    <div class="section-label">Activity</div>
    <div class="cal-area" id="cal-area"></div>
  </div>
  <div>
    <div class="section-label">Projects</div>
    <div id="proj-breakdown"></div>
  </div>
</div>

<div class="table-section">
  <button class="table-toggle" onclick="toggleTable(this)">Hide table</button>
  <div class="table-wrap open" id="table-wrap">
    <table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
  </div>
</div>

<div class="footer">All data is processed locally from ~/.claude/projects · MIT License · v0.1.4<br>Made by mikeqwe &amp; claude</div>

</div>

<script>
/* ── Theme ──────────────────────────────────────────── */
let _theme=localStorage.getItem('cc_usage_theme')||'dark';
document.documentElement.dataset.theme=_theme;
function getTC(){
  const dark=_theme==='dark';
  return {bg:dark?'#0b0b0f':'#f0f0f4',surface:dark?'#16161e':'#ffffff',surfaceHover:dark?'#1c1c28':'#e4e4eb',surfaceActive:dark?'#242432':'#d4d4de',border:dark?'#323244':'#b8b8c8',borderHover:dark?'#a0a0ba':'#3a3a5c',muted:dark?'#9898b4':'#3c3c58',dim:dark?'#acacc4':'#2e2e4a',mid:dark?'#bdbdd2':'#22223e',midHover:dark?'#c0c0d4':'#282840',text:dark?'#d0d0dc':'#2a2a40',heading:dark?'#eeeef4':'#101024',grid:dark?'#1a1a28':'#d8d8e2',rowBorder:dark?'#161620':'#dcdce6',rowHover:dark?'#12121c':'#eaeaf0',totalBg:dark?'#0e0e16':'#e0e0ea',shadow:dark?'rgba(0,0,0,.5)':'rgba(0,0,0,.12)',shadowSm:dark?'rgba(0,0,0,.4)':'rgba(0,0,0,.08)',checkBg:dark?'#6bc4a318':'#6bc4a325',checkBorder:dark?'#6bc4a360':'#6bc4a370',calLabel:dark?'#6e6e8a':'#5a5a74',green:dark?'#6ee7b7':'#059669',yellow:dark?'#fbbf24':'#b45309',yellowDim:dark?'#fbbf2480':'#b4530980'};
}
function calShades(){return _theme==='dark'?['#161b22','#0e4429','#006d32','#26a641','#39d353']:['#dfe2e8','#9be9a8','#40c463','#30a14e','#216e39']}
function toggleTheme(){_theme=_theme==='dark'?'light':'dark';localStorage.setItem('cc_usage_theme',_theme);document.documentElement.dataset.theme=_theme;document.getElementById('theme-btn').textContent=_theme==='dark'?'☾':'☀';if(D)render()}

/* ── Constants ──────────────────────────────────────── */
const PROJ_COLORS = ['#c4956b','#6ba3c4','#9b6bc4','#6bc4a3','#c46b8a','#8ac46b','#c4a36b','#6b8ac4','#c46bba','#6bc4c4','#a3c46b','#c48a6b','#6bc46b','#ba6bc4'];
const MODEL_COLORS = {'opus-4-6':'#a78bfa','opus-4-5':'#c4b5fd','sonnet-4-6':'#f59e0b','sonnet-4-5':'#fbbf24','haiku-4-5':'#34d399','haiku-3-5':'#6ee7b7'};
const ALL_MODELS = ['opus-4-6','opus-4-5','sonnet-4-6','sonnet-4-5','haiku-4-5','haiku-3-5'];
const TF_OPTIONS = [['1d','1d'],['7d','7d'],['30d','30d'],['90d','90d'],['all','All']];
const STORAGE_KEY = 'cc_usage_filter';

/* ── State ──────────────────────────────────────────── */
let D_raw = null, D = null;
let timeframe = 'all', tfOffset = 0;
let gran = 'day', metric = 'cost', stackBy = 'project';
let allProjectsFull = [];  // from D_raw — stable, for dropdown
let allProjects = [];      // from filtered D — for charts
let projColor = {};
let selProjects = new Set();
let hiddenSeries = new Set();
const fontsReady = document.fonts?.ready?.catch(()=>{}) || Promise.resolve();

/* ── Helpers ─────────────────────────────────────────── */
function toLD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtN(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(n>=10e3?0:1)+'K';return n.toFixed(0)}
function fmtC(n){return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtV(v){return metric==='cost'?fmtC(v):fmtN(v)}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function weekStart(day){const d=new Date(day+'T12:00:00');const dow=d.getDay();d.setDate(d.getDate()+(dow===0?-6:1-dow));return toLD(d)}
function getPeriodKey(day){return gran==='day'?day:gran==='month'?day.slice(0,7):weekStart(day)}

/* ── Timeframe ──────────────────────────────────────── */
function getTfRange(){
  if(timeframe==='all') return null;
  const days={'1d':1,'7d':7,'30d':30,'90d':90}[timeframe];
  const end=new Date(); end.setHours(0,0,0,0);
  end.setDate(end.getDate()+tfOffset*(timeframe==='1d'?1:days));
  const start=new Date(end); start.setDate(start.getDate()-days+1);
  return {startStr:toLD(start),endStr:toLD(end),start,end};
}

function applyTimeframe(){
  if(!D_raw) return;
  const all={costs:D_raw.costs,sessions:D_raw.sessions,tools:D_raw.tools,tool_names:D_raw.tool_names||{},compacts:D_raw.compacts,compact_times:D_raw.compact_times||[],peak_session:D_raw.peak_session||{}};
  if(timeframe==='all'){D=all;return;}
  const r=getTfRange();
  const f=d=>d>=r.startStr&&d<=r.endStr;
  const flt=obj=>Object.fromEntries(Object.entries(obj).filter(([d])=>f(d)));
  D={costs:flt(all.costs),sessions:flt(all.sessions),tools:flt(all.tools),tool_names:flt(all.tool_names),compacts:flt(all.compacts),compact_times:all.compact_times.filter(e=>f(e.ts.slice(0,10))),peak_session:flt(all.peak_session)};
}

function initProjectsFull(){
  const c={};
  for(const projs of Object.values(D_raw.costs))
    for(const [p,mods] of Object.entries(projs))
      for(const v of Object.values(mods)) c[p]=(c[p]||0)+v.cost;
  allProjectsFull=Object.entries(c).sort((a,b)=>b[1]-a[1]).map(([p])=>p);
  projColor=Object.fromEntries(allProjectsFull.map((p,i)=>[p,PROJ_COLORS[i%PROJ_COLORS.length]]));
}

function recomputeProjects(){
  const c={};
  for(const projs of Object.values(D.costs))
    for(const [p,mods] of Object.entries(projs))
      for(const v of Object.values(mods)) c[p]=(c[p]||0)+v.cost;
  allProjects=Object.entries(c).sort((a,b)=>b[1]-a[1]).map(([p])=>p);
}

/* ── Persistence ─────────────────────────────────────── */
function saveFilter(){localStorage.setItem(STORAGE_KEY,JSON.stringify([...selProjects]))}
function loadFilter(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s){const a=JSON.parse(s);if(Array.isArray(a)&&a.length)return new Set(a)}}catch(e){}
  return null;
}

/* ── Data loading ───────────────────────────────────── */
async function fetchJsonWithRetry(url,{retries=1,timeoutMs=8000}={}){
  let lastErr;
  for(let attempt=0;attempt<=retries;attempt++){
    const ctl=new AbortController();
    const timer=timeoutMs>0?setTimeout(()=>ctl.abort(),timeoutMs):null;
    try{
      const res=await fetch(url,{cache:'no-store',signal:ctl.signal});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }catch(err){
      lastErr=err;
      if(attempt<retries) await new Promise(r=>setTimeout(r,250));
    }finally{
      if(timer) clearTimeout(timer);
    }
  }
  throw lastErr;
}

async function loadData(){
  const loadingEl=document.getElementById('loading');
  const contentEl=document.getElementById('content');
  let loaderTimer=setTimeout(()=>loadingEl.classList.add('show'),120);
  try{
    D_raw=await fetchJsonWithRetry('/api/data',{retries:1,timeoutMs:120000});
    initProjectsFull();
    const saved=loadFilter();
    selProjects=saved?new Set([...saved].filter(p=>allProjectsFull.includes(p))):new Set(allProjectsFull);
    if(selProjects.size===0) selProjects=new Set(allProjectsFull);
    applyTimeframe(); recomputeProjects();
    await fontsReady;
    buildDateRange(); buildFilterDropdown(); render();
    await new Promise(requestAnimationFrame);
    clearTimeout(loaderTimer);
    contentEl.style.visibility='visible';
    contentEl.style.opacity='1';
    loadingEl.classList.remove('show');
  }catch(e){
    clearTimeout(loaderTimer);
    loadingEl.classList.add('show');
    loadingEl.textContent='Failed to load data';
    console.error(e);
  }
}

async function refreshData(){
  const btn=document.getElementById('update-btn');
  btn.disabled=true; btn.textContent='↻ …';
  try{
    D_raw=await fetchJsonWithRetry('/api/refresh',{retries:0,timeoutMs:120000});
    initProjectsFull();
    applyTimeframe(); recomputeProjects();
    buildDateRange(); buildFilterDropdown(); render();
  }catch(e){console.error(e)}
  btn.disabled=false; btn.textContent='↻ Update';
}

function setTimeframe(tf){
  timeframe=tf;tfOffset=0;
  const ag=allowedGrans();if(!ag.includes(gran))gran=ag[0]||'day';
  if(metric==='output')metric='cost';
  if(metric==='sessions'&&gran==='hour'&&ag.includes('day'))gran='day';
  else if(metric==='sessions'&&gran==='hour')metric='cost';
  applyTimeframe();recomputeProjects();buildDateRange();render();
}
function tfPrev(){
  const allDays=Object.keys(D_raw.costs).sort();
  if(!allDays.length) return;
  tfOffset--;
  const r=getTfRange();
  if(r&&r.endStr<allDays[0]){tfOffset++;return;}
  applyTimeframe();recomputeProjects();buildDateRange();render();
}
function tfNext(){if(tfOffset>=0)return;tfOffset++;applyTimeframe();recomputeProjects();buildDateRange();render()}

/* ── Aggregation ─────────────────────────────────────── */
function aggCosts(){
  const map={};
  for(const [day,projs] of Object.entries(D.costs)){
    const k=getPeriodKey(day);
    for(const [p,mods] of Object.entries(projs)){
      if(!selProjects.has(p)) continue;
      if(!map[k]) map[k]={};if(!map[k][p]) map[k][p]={};
      for(const [m,v] of Object.entries(mods)){
        if(!map[k][p][m]) map[k][p][m]={cost:0,output:0,input:0,cache_read:0,cache_write:0};
        const t=map[k][p][m];t.cost+=v.cost;t.output+=v.output;t.input+=v.input;t.cache_read+=v.cache_read;t.cache_write+=v.cache_write;
      }
    }
  }
  return map;
}
function aggSessions(){const map={};for(const [day,projs] of Object.entries(D.sessions)){const k=getPeriodKey(day);for(const [p,v] of Object.entries(projs)){if(!selProjects.has(p))continue;if(!map[k])map[k]={};map[k][p]=(map[k][p]||0)+v}}return map}
function aggTools(){const map={};for(const [day,projs] of Object.entries(D.tools)){const k=getPeriodKey(day);for(const [p,v] of Object.entries(projs)){if(!selProjects.has(p))continue;if(!map[k])map[k]={};map[k][p]=(map[k][p]||0)+v}}return map}
function aggCompacts(){const map={};for(const [day,projs] of Object.entries(D.compacts)){const k=getPeriodKey(day);for(const [p,v] of Object.entries(projs))if(selProjects.has(p))map[k]=(map[k]||0)+v}return map}

function aggToolNames(){
  // period -> toolName -> count
  const map={};
  for(const [day,projs] of Object.entries(D.tool_names||{})){
    const k=getPeriodKey(day);
    for(const [p,names] of Object.entries(projs)){
      if(!selProjects.has(p))continue;
      if(!map[k])map[k]={};
      for(const [n,c] of Object.entries(names)) map[k][n]=(map[k][n]||0)+c;
    }
  }
  return map;
}

function getTopToolNames(){
  const tc={};
  for(const projs of Object.values(D.tool_names||{}))
    for(const [p,names] of Object.entries(projs)){
      if(!selProjects.has(p))continue;
      for(const [n,c] of Object.entries(names)) tc[n]=(tc[n]||0)+c;
    }
  return Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n])=>n);
}

function metricVal(period,proj,ca,sa,ta){
  if(metric==='cost'){const pm=ca[period]?.[proj];if(!pm)return 0;return Object.values(pm).reduce((s,v)=>s+v.cost,0)}
  if(metric==='sessions')return sa[period]?.[proj]||0;
  if(metric==='tools')return ta[period]?.[proj]||0;
  if(metric==='output'){const pm=ca[period]?.[proj];if(!pm)return 0;return Object.values(pm).reduce((s,v)=>s+v.output,0)}
  return 0;
}
function modelMetricVal(period,model,ca){
  if(metric==='sessions'||metric==='tools')return 0;
  let sum=0;for(const projs of Object.values(ca[period]||{})){const v=projs[model];if(v)sum+=metric==='cost'?v.cost:v.output}return sum;
}

/* ── Date range (with nav arrows) ────────────────────── */
function buildDateRange(){
  const prevBtn=document.getElementById('tf-prev'),nextBtn=document.getElementById('tf-next');
  if(timeframe==='all'){
    prevBtn.style.display='none'; nextBtn.style.display='none';
    const days=Object.keys(D.costs).sort();
    if(!days.length){document.getElementById('date-range').textContent='No data';return}
    const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    document.getElementById('date-range').textContent=fmt(days[0])+' — '+fmt(days[days.length-1]);
  }else{
    prevBtn.style.display=''; nextBtn.style.display='';
    nextBtn.disabled=tfOffset>=0;
    const r=getTfRange();
    const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    document.getElementById('date-range').textContent=fmt(r.start)+' — '+fmt(r.end);
  }
}

/* ── Stats ────────────────────────────────────────────── */
function buildStats(){
  const t={cost:0,sessions:0,tools:0,output:0,input:0,cache_read:0,cache_write:0,compacts:0,days:new Set()};
  for(const [day,projs] of Object.entries(D.costs)){
    let has=false;
    for(const [p,mods] of Object.entries(projs)){if(!selProjects.has(p))continue;has=true;
      for(const v of Object.values(mods)){t.cost+=v.cost;t.output+=v.output;t.input+=v.input;t.cache_read+=v.cache_read;t.cache_write+=v.cache_write}}
    if(has)t.days.add(day);
  }
  for(const projs of Object.values(D.sessions))for(const [p,v] of Object.entries(projs))if(selProjects.has(p))t.sessions+=v;
  for(const projs of Object.values(D.tools))for(const [p,v] of Object.entries(projs))if(selProjects.has(p))t.tools+=v;
  for(const projs of Object.values(D.compacts))for(const [p,v] of Object.entries(projs))if(selProjects.has(p))t.compacts+=v;

  // Peak session cost (actual per-session max from server data)
  let peakSess=0;
  for(const [day,projs] of Object.entries(D.peak_session||{}))
    for(const [p,cost] of Object.entries(projs))
      if(selProjects.has(p)) peakSess=Math.max(peakSess,cost);

  const totalIn=t.cache_read+t.input+t.cache_write;
  const cacheHit=totalIn>0?(t.cache_read/totalIn*100).toFixed(1):'0';
  const nd=t.days.size||1;

  const tokensNonCache=t.input+t.output+t.cache_write;

  // Sessions by project tooltip
  const sessByProj={};
  for(const projs of Object.values(D.sessions))
    for(const [p,v] of Object.entries(projs)) if(selProjects.has(p)) sessByProj[p]=(sessByProj[p]||0)+v;
  const sessSorted=Object.entries(sessByProj).sort((a,b)=>b[1]-a[1]);
  const tipSess=sessSorted.map(([p,v])=>`<div class="tip-row"><span class="tip-label">${escHtml(p.length>22?p.slice(0,20)+'…':p)}</span><span class="tip-val">${v}</span></div>`).join('');

  // Token breakdown tooltip
  const tipTokens=[
    ['Output',fmtN(t.output)],['Input',fmtN(t.input)],
    ['Cache write',fmtN(t.cache_write)],['Cache read',fmtN(t.cache_read)],
  ].map(([l,v])=>`<div class="tip-row"><span class="tip-label">${l}</span><span class="tip-val">${v}</span></div>`).join('');

  // Tool calls by name tooltip
  const toolCounts={};
  for(const projs of Object.values(D.tool_names||{}))
    for(const [p,names] of Object.entries(projs)){
      if(!selProjects.has(p))continue;
      for(const [n,c] of Object.entries(names)) toolCounts[n]=(toolCounts[n]||0)+c;
    }
  const toolsSorted=Object.entries(toolCounts).sort((a,b)=>b[1]-a[1]);
  const tipTools=toolsSorted.map(([n,c])=>`<div class="tip-row"><span class="tip-label">${escHtml(n.replace(/^mcp__[^_]+__/,'').replace(/^mcp__/,''))}</span><span class="tip-val">${fmtN(c)}</span></div>`).join('');

  // Limit hits tooltip — exact timestamps, newest first
  const limitEvents=(D.compact_times||[]).filter(e=>selProjects.has(e.project));
  const tipLimits=limitEvents.length?limitEvents.map(e=>{
    const d=new Date(e.ts.replace('Z','+00:00'));
    const ds=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
    return `<div class="tip-row"><span class="tip-label">${ds}</span><span class="tip-val" style="color:${getTC().dim}">${escHtml(e.project)}</span></div>`;
  }).join(''):'';

  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total cost</div><div class="stat-value" style="color:${getTC().green}">${fmtC(t.cost)}</div><div class="stat-sub">${fmtC(t.cost/nd)} / active day</div></div>
    <div class="stat stat-hover"><div class="stat-label">Sessions</div><div class="stat-value">${fmtN(t.sessions)}</div><div class="stat-sub">peak ${fmtC(peakSess)}</div><div class="stat-tip">${tipSess}</div></div>
    <div class="stat stat-hover"><div class="stat-label">Token usage</div><div class="stat-value">${fmtN(tokensNonCache)}<span style="color:${getTC().muted};font-size:1rem;font-weight:400"> + ${fmtN(t.cache_read)} ↻</span></div><div class="stat-sub">${cacheHit}% cache hit</div><div class="stat-tip">${tipTokens}</div></div>
    <div class="stat stat-hover"><div class="stat-label">Tool calls</div><div class="stat-value">${fmtN(t.tools)}</div><div class="stat-sub">${toolsSorted.length?escHtml(toolsSorted[0][0].replace(/^mcp__[^_]+__/,'').replace(/^mcp__/,''))+' '+fmtN(toolsSorted[0][1]):''}</div><div class="stat-tip">${tipTools}</div></div>
    <div class="stat${tipLimits?' stat-hover':''}"><div class="stat-label">Limit hits</div><div class="stat-value" style="color:${getTC().yellow}">${t.compacts}</div><div class="stat-sub">${t.days.size} active days</div>${tipLimits?`<div class="stat-tip">${tipLimits}</div>`:''}</div>`;
}

function allowedGrans(){
  if(timeframe==='1d') return ['hour'];
  if(timeframe==='7d') return ['hour','day'];
  if(timeframe==='30d') return ['day','week'];
  return ['day','week','month'];
}

  const metrics=[['cost','Cost'],['sessions','Sessions'],['tools','Tools']];
  const grans=[['hour','H'],['day','D'],['week','W'],['month','M']];

/* ── Main chart ──────────────────────────────────────── */
let mainChart;let _chartLabels=[];
function buildMainChart(labels,datasets,compactsAgg){
  const wrap=document.querySelector('.chart-wrap');
  if(typeof Chart==='undefined'){
    if(mainChart)mainChart.destroy();
    mainChart=null;
    wrap.innerHTML='<div class="chart-fallback">Chart unavailable</div>';
    return;
  }
  if(!document.getElementById('mainChart'))
    wrap.innerHTML='<canvas id="mainChart"></canvas>';
  if(mainChart)mainChart.destroy();
  if(stackBy==='model'||stackBy==='tool'){
    _chartLabels=datasets.map(d=>d.label);
    document.getElementById('model-legend').innerHTML=datasets.map((d,di)=>`
      <div class="mleg${hiddenSeries.has(d.label)?' off':''}" onclick="toggleSeries(_chartLabels[${di}])">
        <span class="mleg-dot" style="background:${d.backgroundColor||'#555'}"></span>${escHtml(d.label)}
      </div>`).join('');
  }else document.getElementById('model-legend').innerHTML='';

  const visDs=datasets.filter(d=>!hiddenSeries.has(d.label));
  const compactData=labels.map(l=>compactsAgg[l]||0);
  const hasLimitHits=compactData.some(v=>v>0);

  const limitHitPlugin={
    id:'limitHitBolt',
    afterDatasetsDraw(chart){
      const meta=chart.getDatasetMeta(chart.data.datasets.length-1);
      if(!meta||!meta.data)return;
      const ctx=chart.ctx;
      const minBoltY=chart.chartArea.top+18;
      ctx.save();
      ctx.textAlign='center';
      ctx.textBaseline='bottom';
      for(let i=0;i<meta.data.length;i++){
        if(!compactData[i])continue;
        const bar=meta.data[i];
        // find top of stacked bar
        let topY=bar.y;
        for(const ds of chart.data.datasets){
          const m2=chart.getDatasetMeta(chart.data.datasets.indexOf(ds));
          if(m2&&m2.data[i]&&m2.data[i].y<topY)topY=m2.data[i].y;
        }
        ctx.fillStyle=getTC().yellow;
        ctx.font='bold 11px sans-serif';
        ctx.fillText('\u26A1\uFE0E',bar.x,Math.max(topY-4,minBoltY));
      }
      ctx.restore();
    }
  };

  mainChart=new Chart(document.getElementById('mainChart'),{
    type:'bar',data:{labels,datasets:visDs},
    plugins:[limitHitPlugin],
    options:{
      responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:hasLimitHits?18:0}},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          filter:item=>item.parsed.y>0,
          itemSort:(a,b)=>b.parsed.y-a.parsed.y,
          callbacks:{
            title:items=>{if(!items.length)return'';const l=items[0].label;const total=items.reduce((s,i)=>s+i.parsed.y,0);let t='';if(l.includes('|')){const [dy,h]=l.split('|');const d=new Date(dy+'T12:00:00');t=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+' '+h+':00'}else{t=l}const idx=items[0].dataIndex;const ch=compactData[idx];let suffix='';if(total>0)suffix+='  ·  '+fmtV(total);if(ch>0)suffix+='  ·  ⚡'+ch;return t+suffix},
            label:ctx=>` ${ctx.dataset.label}: ${fmtV(ctx.parsed.y)}`
          },
          backgroundColor:getTC().surfaceHover,titleColor:getTC().mid,bodyColor:getTC().heading,bodyFont:{family:'JetBrains Mono',size:11},
          borderColor:getTC().border,borderWidth:1,padding:10,cornerRadius:6
        }
      },
      scales:{
        x:{stacked:true,ticks:{color:getTC().borderHover,maxRotation:0,font:{family:'Outfit',size:10},maxTicksLimit:gran==='day'?15:undefined,autoSkip:true,
          callback:function(v){const l=this.getLabelForValue(v);if(!l)return l;if(gran==='hour'){const [dy,h]=l.split('|');if(h==='00'||h==='12'){const d=new Date(dy+'T12:00:00');return h==='00'?d.toLocaleDateString('en-US',{month:'short',day:'numeric'}):'12:00'}return ''}if(gran==='month')return l;const d=new Date(l+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
        },grid:{display:false},border:{display:false}},
        y:{stacked:true,grace:hasLimitHits?'16%':0,ticks:{color:getTC().borderHover,font:{family:'JetBrains Mono',size:10},callback:v=>metric==='cost'?'$'+v.toFixed(0):fmtN(v)},grid:{color:getTC().grid},border:{display:false}}
      }
    }
  });
}

/* ── Calendar (always uses D_raw — full data) ────────── */
function buildCal(){
  const dayCost={};
  for(const [day,projs] of Object.entries(D_raw.costs)){
    let c=0;
    for(const [p,mods] of Object.entries(projs)){
      if(!selProjects.has(p))continue;
      for(const v of Object.values(mods))c+=v.cost;
    }
    if(c>0)dayCost[day]=c;
  }
  const dayCompact={};
  for(const [day,projs] of Object.entries(D_raw.compacts))
    for(const [p,v] of Object.entries(projs))
      if(selProjects.has(p))dayCompact[day]=(dayCompact[day]||0)+v;

  const days=Object.keys(dayCost).sort();
  if(!days.length){document.getElementById('cal-area').innerHTML='<span style="color:'+getTC().borderHover+';font-size:.72rem">No data</span>';return}

  const maxCost=Math.max(...Object.values(dayCost));
  function shade(cost){if(!cost)return calShades()[0];return calShades()[Math.min(Math.ceil(cost/maxCost*4),4)]}

  // Always show 6 months back from today
  const today=new Date(); today.setHours(12,0,0,0);
  const sixMonthsAgo=new Date(today); sixMonthsAgo.setMonth(sixMonthsAgo.getMonth()-6);

  // Start from actual date (don't pad beginning with empty cells, like GitLab)
  const start=new Date(sixMonthsAgo);
  // End on today (don't render future days, like GitLab)
  const end=new Date(today);

  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let weeks=[],week=[];
  const cur=new Date(start); cur.setHours(12,0,0,0);
  while(cur<=end){
    const ds=toLD(cur);
    week.push({day:ds,cost:dayCost[ds]||0,compact:dayCompact[ds]||0,mo:cur.getMonth()});
    if(cur.getDay()===0){weeks.push(week);week=[]}
    cur.setDate(cur.getDate()+1);
  }
  if(week.length)weeks.push(week);

  // Month labels
  let mhtml='<div style="display:flex;margin-bottom:3px;margin-left:18px">';
  let prevMo=-1,span=0;
  for(const wk of weeks){
    const mo=wk[0]?.mo;
    if(mo!==prevMo){if(prevMo>=0)mhtml+=`<div style="width:${span*17}px;font-size:.58rem;color:${getTC().borderHover}">${MONTHS[prevMo]}</div>`;prevMo=mo;span=1}else span++;
  }
  mhtml+=`<div style="font-size:.58rem;color:${getTC().borderHover}">${MONTHS[prevMo]||''}</div></div>`;

  let whtml='<div style="display:flex;gap:3px">';
  whtml+='<div style="display:flex;flex-direction:column;gap:3px">';
  ['','T','','T','','S',''].forEach(l=>whtml+=`<div style="width:10px;height:14px;font-size:.55rem;color:${getTC().calLabel};line-height:14px;text-align:right">${l}</div>`);
  whtml+='</div>';

  for(let wi=0;wi<weeks.length;wi++){
    const wk=weeks[wi];
    whtml+='<div style="display:flex;flex-direction:column;gap:3px">';
    if(wi===0){
      const fd=new Date(wk[0].day+'T12:00:00');
      const pad=fd.getDay()===0?6:fd.getDay()-1;
      for(let i=0;i<pad;i++)whtml+=`<div style="width:14px;height:14px"></div>`;
    }
    for(const {day,cost,compact} of wk){
      const c=shade(cost);
      const dt=new Date(day+'T12:00:00');
      const label=dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      let tip=label;
      if(cost>0) tip+=`  ·  $${cost.toFixed(0)}`;
      if(compact) tip+=`  ·  ⚡${compact}`;
      const ring=compact?`outline:1.5px solid ${getTC().yellow};outline-offset:1px;`:'';
      whtml+=`<div class="cal-cell" style="background:${c};${ring}" onmouseenter="calTip(event,'${tip}')" onmouseleave="calTipHide()"></div>`;
    }
    whtml+='</div>';
  }
  whtml+='</div>';

  const legend=`<div class="cal-legend" style="padding:4px 0">Less ${calShades().map(c=>`<div style="width:10px;height:10px;border-radius:2px;background:${c}"></div>`).join('')} More <span style="margin:0 4px 0 10px;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border:1.5px solid ${getTC().yellow};border-radius:3px;vertical-align:middle"><span style="width:10px;height:10px;border-radius:2px;background:${calShades()[2]};display:block"></span></span>limit hit</div>`;
  document.getElementById('cal-area').innerHTML=mhtml+whtml+legend;
}

/* ── Breakdown bars ──────────────────────────────────── */
function buildBreakdown(){
  const el=document.getElementById('proj-breakdown');
  const projHits={};
  for(const projs of Object.values(D.compacts))for(const [p,v] of Object.entries(projs))projHits[p]=(projHits[p]||0)+v;
  const maxHits=Math.max(...Object.values(projHits),1);
  // Always show cost for project breakdown (stable reference)
  const pv={};
  for(const p of allProjects){
    if(!selProjects.has(p))continue;let v=0;
    for(const projs of Object.values(D.costs)){const mods=projs[p];if(mods)for(const m of Object.values(mods))v+=m.cost}
    if(v>0)pv[p]=v;
  }
  const maxV=Math.max(...Object.values(pv),1);
  const sorted=allProjects.filter(p=>pv[p]>0).map(p=>[p,pv[p]]);
  const shown=sorted.slice(0,6),rest=sorted.slice(6);
  const restTotal=rest.reduce((s,[,v])=>s+v,0);

  function hitStyle(p){const h=projHits[p]||0;const alpha=h>0?(0.25+0.75*Math.min(h/maxHits,1)).toFixed(2):'0';return `border-left:2px solid rgba(251,191,36,${alpha});padding-left:6px;`}

  el.innerHTML=shown.map(([p,v])=>{
    const h=projHits[p]||0;
    const hitLabel=h>0?`<span style="color:${getTC().yellow};font-size:.6rem;opacity:${(0.4+0.6*Math.min(h/maxHits,1)).toFixed(2)};margin-left:4px">${h}</span>`:'';
    return `<div class="bk-item" style="${hitStyle(p)}"><div class="bk-top"><span class="bk-name"><span style="width:6px;height:6px;border-radius:50%;background:${projColor[p]||'#555'};display:inline-block"></span>${escHtml(p.length>24?p.slice(0,22)+'…':p)}${hitLabel}</span><span class="bk-val">${fmtC(v)}</span></div><div class="bk-track"><div class="bk-fill" style="width:${(v/maxV*100).toFixed(1)}%;background:${(projColor[p]||'#555')}80"></div></div></div>`;
  }).join('')+(rest.length?`<div style="font-size:.65rem;color:${getTC().borderHover};margin-top:8px;padding-left:8px">+${rest.length} more (${fmtC(restTotal)})</div>`:'');
}

/* ── Table ────────────────────────────────────────────── */
function toggleTable(btn){const w=document.getElementById('table-wrap');const open=w.classList.toggle('open');btn.textContent=open?'Hide table':'Show table ›';if(open)buildTable()}

function buildTable(){
  const ca=aggCosts(),sa=aggSessions(),ta=aggTools(),xa=aggCompacts(),tna=aggToolNames();
  const periods=new Set([...Object.keys(ca),...Object.keys(sa),...Object.keys(tna)]);const labels=[...periods].sort();
  let cols,hasOther=false;
  if(stackBy==='project'){const selArr=allProjects.filter(p=>selProjects.has(p));if(selArr.length>6){cols=selArr.slice(0,6);hasOther=true}else cols=selArr}else if(stackBy==='tool'){cols=getTopToolNames().map(n=>n.replace(/^mcp__[^_]+__/,'').replace(/^mcp__/,''));hasOther=true}else cols=ALL_MODELS;

  function fmtDate(d){if(gran==='month')return d;const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}

  document.getElementById('thead').innerHTML='<th>Period</th>'+cols.map(c=>`<th class="num">${escHtml(c.length>14?c.slice(0,12)+'…':c)}</th>`).join('')+(hasOther?'<th class="num">Other</th>':'')+'<th class="num">Total</th>';
  let grand=0;const colTotals=Object.fromEntries(cols.map(c=>[c,0]));let otherGrand=0;

  const rows=[...labels].reverse().map(l=>{
    let rowTotal=0;const comp=xa[l]||0;
    const cells=cols.map(c=>{let v=0;if(stackBy==='project')v=metricVal(l,c,ca,sa,ta);else if(stackBy==='tool'){const tn=tna[l];if(tn){const fullNames=getTopToolNames();const short=n=>n.replace(/^mcp__[^_]+__/,'').replace(/^mcp__/,'');const fn=fullNames.find(n=>short(n)===c);if(fn&&tn[fn])v=tn[fn]}}else{if(metric==='cost'||metric==='output'){const cv=ca[l];if(cv)for(const pm of Object.values(cv))if(pm[c])v+=(metric==='cost'?pm[c].cost:pm[c].output)}}colTotals[c]+=v;rowTotal+=v;return `<td class="num">${v>0?fmtV(v):'<span style="color:'+getTC().surfaceActive+'">—</span>'}</td>`}).join('');
    let otherV=0;if(hasOther){if(stackBy==='tool'){const topSet=new Set(getTopToolNames());const tn=tna[l];if(tn)for(const [n,c] of Object.entries(tn))if(!topSet.has(n))otherV+=c}else{for(const c of allProjects.filter(p=>selProjects.has(p)).slice(6))otherV+=metricVal(l,c,ca,sa,ta)}rowTotal+=otherV;otherGrand+=otherV}
    grand+=rowTotal;
    const cm=comp>0?`<span style="color:${getTC().yellow};font-size:.6rem;margin-left:4px">${comp}</span>`:'';
    const oc=hasOther?`<td class="num">${otherV>0?fmtV(otherV):'<span style="color:'+getTC().surfaceActive+'">—</span>'}</td>`:'';
    const hs=comp>0?` style="border-left:2px solid ${getTC().yellowDim};white-space:nowrap"`:'style="white-space:nowrap"';
    return `<tr><td ${hs}>${fmtDate(l)}${cm}</td>${cells}${oc}<td class="${metric==='cost'?'cost-td':'num'}">${fmtV(rowTotal)}</td></tr>`;
  });
  const totalCells=cols.map(c=>`<td class="num">${fmtV(colTotals[c])}</td>`).join('');
  const ot=hasOther?`<td class="num">${fmtV(otherGrand)}</td>`:'';
  rows.push(`<tr class="tr-total"><td>Total</td>${totalCells}${ot}<td class="${metric==='cost'?'cost-td':'num'}">${fmtV(grand)}</td></tr>`);
  document.getElementById('tbody').innerHTML=rows.join('');
  const tw=document.getElementById('table-wrap');
  tw.onmouseover=function(e){const td=e.target.closest('td,th');if(!td)return;const ci=Array.from(td.parentNode.children).indexOf(td);tw.querySelectorAll('.col-hl').forEach(el=>el.classList.remove('col-hl'));tw.querySelectorAll('tr').forEach(tr=>{const c=tr.children[ci];if(c)c.classList.add('col-hl')})};
  tw.onmouseleave=function(){tw.querySelectorAll('.col-hl').forEach(el=>el.classList.remove('col-hl'))};
}

/* ── Render ───────────────────────────────────────────── */
function render(){
  if(!D)return;
  buildStats(); buildControls(); buildCal(); buildBreakdown();

  let labels,datasets,xa;

  if(gran==='hour'){
    // Hourly view (1d or 7d)
    const r=getTfRange();
    const startD=new Date(r.startStr+'T12:00:00');
    const endD=new Date(r.endStr+'T12:00:00');
    labels=[];
    const dayList=[];
    for(const d=new Date(startD);d<=endD;d.setDate(d.getDate()+1)){
      const ds=toLD(d);
      dayList.push(ds);
      for(let h=0;h<24;h++) labels.push(ds+'|'+String(h).padStart(2,'0'));
    }
    xa={};
    const activeProjs=allProjects.filter(p=>selProjects.has(p));
    const isTool=metric==='tools';
    if(stackBy==='model'&&!isTool){
      datasets=ALL_MODELS.map(m=>({
        label:m,
        data:labels.map(lbl=>{const [dy,h]=lbl.split('|');let s=0;const hp=D_raw.costs_hourly?.[dy]?.[h];if(hp)for(const [p,mods] of Object.entries(hp)){if(!selProjects.has(p))continue;if(mods[m])s+=mods[m].cost}return s}),
        backgroundColor:MODEL_COLORS[m]||'#555',borderRadius:1,borderSkipped:false,stack:'main',
      }));
    }else{
      datasets=activeProjs.map(p=>({
        label:p,
        data:labels.map(lbl=>{const [dy,h]=lbl.split('|');
          if(isTool) return D_raw.tools_hourly?.[dy]?.[h]?.[p]||0;
          let s=0;const hp=D_raw.costs_hourly?.[dy]?.[h];if(hp&&hp[p])for(const v of Object.values(hp[p]))s+=v.cost;return s;
        }),
        backgroundColor:(projColor[p]||'#555')+'cc',borderRadius:1,borderSkipped:false,stack:'main',
      }));
    }
  }else{
    const ca=aggCosts(),sa=aggSessions(),ta=aggTools();
    xa=aggCompacts();
    const allPeriods=new Set([...Object.keys(ca),...Object.keys(sa),...Object.keys(ta)]);
    labels=[...allPeriods].sort();

    if(stackBy==='project'){
      datasets=allProjects.filter(p=>selProjects.has(p)).map(p=>({
        label:p,data:labels.map(l=>metricVal(l,p,ca,sa,ta)),
        backgroundColor:(projColor[p]||'#555')+'cc',borderRadius:gran==='day'?1:2,borderSkipped:false,stack:'main',
      }));
    }else{
      datasets=ALL_MODELS.map(m=>({
        label:m,data:labels.map(l=>modelMetricVal(l,m,ca)),
        backgroundColor:MODEL_COLORS[m]||'#555',borderRadius:gran==='day'?1:2,borderSkipped:false,stack:'main',
      }));
    }
  }
  buildMainChart(labels,datasets,xa||{});
  if(document.getElementById('table-wrap').classList.contains('open'))buildTable();
}

function toggleSeries(k){hiddenSeries.has(k)?hiddenSeries.delete(k):hiddenSeries.add(k);render()}
function setGran(g){if(!allowedGrans().includes(g))return;gran=g;render()}
function setStack(s){stackBy=s;hiddenSeries.clear();if(s==='model'&&(metric==='sessions'||metric==='tools'))metric='cost';render()}
function setMetric(m){metric=m;render()}

/* ── Calendar tooltip ─────────────────────────────────── */
function calTip(e,text){
  const t=document.getElementById('cal-tip');
  t.textContent=text;t.style.display='block';
  const r=e.target.getBoundingClientRect();
  t.style.left=(r.left+r.width/2-t.offsetWidth/2)+'px';
  t.style.top=(r.top-t.offsetHeight-6)+'px';
}
function calTipHide(){document.getElementById('cal-tip').style.display='none'}

/* ── Init ─────────────────────────────────────────────── */
document.getElementById('theme-btn').textContent=_theme==='dark'?'☾':'☀';
loadData();
</script>
